# cspell:ignore tonumber
name: "PHP Tests"
on:
  push:
jobs:
  wp-versions:
    runs-on: ubuntu-latest

    outputs:
      versions: ${{ steps.get-versions.outputs.versions }}

    steps:
      - name: Get latest two WordPress minor releases
        id: get-versions
        run: |
          # Fetch all stable versions, group by minor branch, pick latest patch from the two newest branches
          VERSIONS=$(curl -s https://api.wordpress.org/core/version-check/1.7/ | \
            jq -c '[.offers[].version] | unique | map(select(test("^[0-9]+\\.[0-9]")))
              | group_by(split(".")[0:2] | join("."))
              | map(sort_by(split(".") | map(tonumber)) | last)
              | sort_by(split(".") | map(tonumber))
              | .[-2:-1]')
          # "latest" covers the newest minor branch; VERSIONS has the previous one
          MATRIX=$(echo "$VERSIONS" | jq -c '["latest"] + .')
          echo "versions=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "WordPress versions for matrix: $MATRIX"

  test:
    needs: wp-versions
    runs-on: ubuntu-latest
    strategy:
      matrix:
        wordpress: ${{ fromJson(needs.wp-versions.outputs.versions) }}

        php:
          - "7.4"
          - "8.4"

    name: "Tests: WP ${{ matrix.wordpress }} / PHP ${{ matrix.php }}"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1000
          submodules: recursive
      # ------------------------------------------------------------------------------
      # Checkout slic
      # ------------------------------------------------------------------------------
      - name: Checkout slic
        uses: actions/checkout@v6
        with:
          repository: stellarwp/slic
          ref: main
          path: slic
          fetch-depth: 1

      # ------------------------------------------------------------------------------
      # Initialize slic
      # ------------------------------------------------------------------------------
      - name: Set up slic env vars
        run: |
          echo "SLIC_BIN=${GITHUB_WORKSPACE}/slic/slic" >> $GITHUB_ENV
          echo "SLIC_WP_DIR=${GITHUB_WORKSPACE}/slic/_wordpress" >> $GITHUB_ENV
          echo "SLIC_WORDPRESS_DOCKERFILE=Dockerfile.base" >> $GITHUB_ENV

      - name: Set run context for slic
        run: echo "SLIC=1" >> $GITHUB_ENV && echo "CI=1" >> $GITHUB_ENV

      - name: Start ssh-agent
        run: |
          mkdir -p "${HOME}/.ssh";
          ssh-agent -a /tmp/ssh_agent.sock;

      - name: Export SSH_AUTH_SOCK env var
        run: echo "SSH_AUTH_SOCK=/tmp/ssh_agent.sock" >> $GITHUB_ENV

      - name: Set up slic for CI
        run: |
          cd ${GITHUB_WORKSPACE}/..
          ${SLIC_BIN} here
          ${SLIC_BIN} interactive off
          ${SLIC_BIN} build-prompt off
          ${SLIC_BIN} build-subdir off
          ${SLIC_BIN} xdebug off
          ${SLIC_BIN} debug on
          ${SLIC_BIN} php-version set ${{ matrix.php }} --skip-rebuild

      - name: Set up StellarWP Uplink (Sets PHP version for containers)
        run: |
          ${SLIC_BIN} use uplink
          ${SLIC_BIN} composer set-version 2
          ${SLIC_BIN} composer validate
          ${SLIC_BIN} composer install

      - name: Show slic info / config
        run: |
          ${SLIC_BIN} info
          ${SLIC_BIN} config

      - name: Install specific WordPress version ${{ matrix.wordpress }}
        run: |
          ${SLIC_BIN} wp core download --version=${{ matrix.wordpress }} --force
          ${SLIC_BIN} wp core update-db

      - name: Show WordPress version
        run: ${SLIC_BIN} wp core version

      - name: Update installed WordPress themes
        run: ${SLIC_BIN} wp theme update --all

      - name: Build codeception
        run: ${SLIC_BIN} cc build

      - name: Run muwpunit tests
        run: ${SLIC_BIN} run muwpunit --ext DotReporter

      - name: Run wpunit tests (singlesite)
        run: ${SLIC_BIN} run wpunit --env singlesite --ext DotReporter

      - name: Run wpunit tests (multisite)
        run: ${SLIC_BIN} run wpunit --env multisite --ext DotReporter

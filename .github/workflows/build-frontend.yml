# cspell:ignore stefanzweifel
name: Build and commit frontend assets

on:
  push:
    paths:
      - "resources/**"
      - "package.json"
      - "bun.lock"
      - "webpack.config.js"
      - "tsconfig.json"
      - "tailwind.config.js"
      - "postcss.config.js"
      - "components.json"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build assets
        run: bun run build

      - name: Commit and push built assets
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Build frontend assets"
          file_pattern: "build/* build-dev/*"
          add_options: "-f"
